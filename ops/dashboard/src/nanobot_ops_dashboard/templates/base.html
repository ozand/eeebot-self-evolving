<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta http-equiv="refresh" content="30">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title or 'eeebot Ops Dashboard' }}</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #08111c;
        --bg-elev: #0f1726;
        --bg-card: #101b2f;
        --bg-card-2: #14243a;
        --border: #23344d;
        --text: #e5eefb;
        --muted: #9bb0c9;
        --accent: #7dd3fc;
        --pass: #22c55e;
        --pass-bg: rgba(34, 197, 94, 0.14);
        --block: #f97316;
        --block-bg: rgba(249, 115, 22, 0.15);
        --unknown: #94a3b8;
        --unknown-bg: rgba(148, 163, 184, 0.16);
        --shadow: 0 10px 28px rgba(0, 0, 0, 0.28);
      }

      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      body {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: radial-gradient(circle at top, #12213c 0%, var(--bg) 40%, #060b13 100%);
        color: var(--text);
        line-height: 1.45;
      }

      .shell {
        max-width: 1440px;
        margin: 0 auto;
        padding: 1.25rem;
      }

      .topbar {
        display: flex;
        flex-wrap: wrap;
        gap: 1rem;
        align-items: center;
        justify-content: space-between;
        padding: 1rem 1.2rem;
        background: linear-gradient(180deg, rgba(16, 27, 47, 0.96), rgba(11, 18, 31, 0.96));
        border: 1px solid var(--border);
        border-radius: 16px;
        box-shadow: var(--shadow);
        margin-bottom: 1rem;
      }

      .brand h1 {
        margin: 0;
        font-size: 1.45rem;
        letter-spacing: 0.02em;
      }

      .brand .subtitle {
        margin-top: .15rem;
        color: var(--muted);
        font-size: .92rem;
      }

      .nav {
        display: flex;
        flex-wrap: wrap;
        gap: .55rem;
        align-items: center;
      }

      .nav a,
      .button,
      button {
        color: var(--text);
        text-decoration: none;
        background: rgba(125, 211, 252, 0.08);
        border: 1px solid rgba(125, 211, 252, 0.18);
        border-radius: 999px;
        padding: .55rem .9rem;
        transition: transform .12s ease, background .12s ease, border-color .12s ease;
      }

      .nav a:hover,
      .button:hover,
      button:hover {
        background: rgba(125, 211, 252, 0.16);
        border-color: rgba(125, 211, 252, 0.3);
        transform: translateY(-1px);
      }

      main { display: block; }

      h2, h3 {
        margin: 0 0 .8rem;
        line-height: 1.2;
      }

      h2 {
        font-size: 1.3rem;
        letter-spacing: .01em;
      }

      h3 {
        font-size: 1.03rem;
        color: #f1f5f9;
      }

      p { margin-top: 0; }
      a { color: var(--accent); }
      code {
        color: #fda4af;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 8px;
        padding: .1rem .35rem;
      }

      .cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 1rem;
        margin: 1rem 0 1.25rem;
      }

      .card {
        background: linear-gradient(180deg, rgba(20, 36, 58, 0.96), rgba(11, 18, 31, 0.96));
        border: 1px solid var(--border);
        padding: 1rem;
        border-radius: 16px;
        box-shadow: var(--shadow);
      }

      .card.compact { padding: .85rem 1rem; }
      .card .muted { color: var(--muted); }

      .section {
        margin: 1.5rem 0;
      }

      .section-header {
        display: flex;
        gap: .75rem;
        align-items: center;
        justify-content: space-between;
        margin-bottom: .7rem;
      }

      .section-note {
        color: var(--muted);
        font-size: .92rem;
      }

      .filter-bar {
        display: flex;
        flex-wrap: wrap;
        gap: .75rem;
        align-items: end;
        margin-bottom: 1rem;
        padding: 1rem;
        background: rgba(16, 27, 47, 0.72);
        border: 1px solid var(--border);
        border-radius: 16px;
      }

      .filter-bar label,
      .field {
        display: grid;
        gap: .35rem;
        color: var(--muted);
        font-size: .92rem;
      }

      .filter-bar input {
        min-width: 220px;
        color: var(--text);
        background: #0b1321;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: .6rem .75rem;
      }

      .filter-bar select {
        min-width: 220px;
        color: var(--text);
        background: #0b1321;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: .6rem .75rem;
      }

      .filter-bar button {
        cursor: pointer;
        font-size: .95rem;
      }

      .status-pill {
        display: inline-flex;
        align-items: center;
        gap: .35rem;
        padding: .2rem .55rem;
        border-radius: 999px;
        border: 1px solid transparent;
        font-size: .75rem;
        font-weight: 700;
        letter-spacing: .04em;
        text-transform: uppercase;
        vertical-align: middle;
        white-space: nowrap;
      }

      .status-pill::before {
        content: '';
        width: .45rem;
        height: .45rem;
        border-radius: 50%;
        background: currentColor;
      }

      .status-pass {
        color: var(--pass);
        background: var(--pass-bg);
        border-color: rgba(34, 197, 94, 0.28);
      }

      .status-block {
        color: var(--block);
        background: var(--block-bg);
        border-color: rgba(249, 115, 22, 0.32);
      }

      .status-unknown,
      .status-neutral {
        color: var(--unknown);
        background: var(--unknown-bg);
        border-color: rgba(148, 163, 184, 0.26);
      }

      .status-large {
        font-size: .82rem;
        padding: .35rem .75rem;
      }

      .status-stack {
        display: flex;
        align-items: center;
        gap: .5rem;
        flex-wrap: wrap;
      }

      .status-value {
        font-size: 1.2rem;
        font-weight: 700;
      }

      .kv-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: .75rem 1rem;
      }

      .kv {
        padding: .7rem .8rem;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      .kv .label {
        color: var(--muted);
        font-size: .82rem;
        text-transform: uppercase;
        letter-spacing: .05em;
        margin-bottom: .25rem;
      }

      .kv .value {
        font-size: .98rem;
        word-break: break-word;
      }

      .timeline-list {
        display: grid;
        gap: .75rem;
      }

      .timeline-item {
        display: grid;
        gap: .55rem;
        padding: .9rem 1rem;
        background: rgba(15, 23, 38, 0.9);
        border: 1px solid var(--border);
        border-left-width: .45rem;
        border-radius: 14px;
        box-shadow: var(--shadow);
      }

      .timeline-item.status-pass { border-left-color: var(--pass); }
      .timeline-item.status-block { border-left-color: var(--block); }
      .timeline-item.status-unknown,
      .timeline-item.status-neutral { border-left-color: var(--unknown); }

      .timeline-head {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        gap: .65rem;
        align-items: center;
      }

      .timeline-title {
        display: flex;
        align-items: center;
        gap: .5rem;
        flex-wrap: wrap;
        font-weight: 700;
      }

      .timeline-meta {
        display: flex;
        flex-wrap: wrap;
        gap: .45rem;
        color: var(--muted);
        font-size: .88rem;
      }

      .detail-stack {
        display: grid;
        gap: .35rem;
      }

      .detail-row {
        display: flex;
        flex-wrap: wrap;
        gap: .4rem;
        align-items: baseline;
      }

      .detail-label {
        color: var(--muted);
        font-weight: 600;
      }

      .history-table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
        margin-top: .25rem;
        overflow: hidden;
      }

      .history-table th,
      .history-table td {
        border-bottom: 1px solid rgba(35, 52, 77, .9);
        padding: .75rem .7rem;
        text-align: left;
        vertical-align: top;
      }

      .history-table th {
        position: sticky;
        top: 0;
        z-index: 1;
        background: #0f1726;
        color: #cfe0f7;
        font-size: .8rem;
        text-transform: uppercase;
        letter-spacing: .05em;
      }

      .history-table tbody tr:hover {
        background: rgba(125, 211, 252, 0.04);
      }

      .history-table td.mono,
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }

      .chip-row {
        display: flex;
        gap: .4rem;
        flex-wrap: wrap;
      }

      .callout {
        padding: .85rem 1rem;
        border-radius: 14px;
        border: 1px solid var(--border);
        background: rgba(125, 211, 252, 0.05);
      }

      .muted { color: var(--muted); }
      ul { margin-top: .35rem; }
      li { margin-bottom: .2rem; }

      @media (max-width: 900px) {
        .topbar { align-items: flex-start; }
        .filter-bar input { min-width: 0; width: 100%; }
        .history-table,
        .history-table thead,
        .history-table tbody,
        .history-table th,
        .history-table td,
        .history-table tr {
          display: block;
        }
        .history-table thead { display: none; }
        .history-table tr {
          margin-bottom: .8rem;
          border: 1px solid var(--border);
          border-radius: 14px;
          overflow: hidden;
          background: rgba(15, 23, 38, 0.9);
        }
        .history-table td {
          border-bottom: 1px solid rgba(35, 52, 77, .8);
          display: flex;
          gap: .7rem;
        }
        .history-table td::before {
          content: attr(data-label);
          min-width: 7.5rem;
          color: var(--muted);
          text-transform: uppercase;
          letter-spacing: .05em;
          font-size: .75rem;
          font-weight: 700;
        }
      }
    </style>
  </head>
  <body data-latest-collected="{{ latest_collected or '' }}">
    <div class="shell">
      <header class="topbar">
        <div class="brand">
          <h1>eeebot Ops Dashboard</h1>
          <div class="subtitle">Operator view for live eeepc truth, repo-side snapshots, and historical cycle evidence</div>
        </div>
        <nav class="nav">
          <a href="/">Overview</a>
          <a href="/cycles">Cycles</a>
          <a href="/promotions">Promotions</a>
          <a href="/approvals">Approvals</a>
          <a href="/deployments">Deployments</a>
          <a href="/plan">Plan</a>
          <a href="/hypotheses">Hypotheses</a>
          <a href="/experiments">Experiments</a>
          <a href="/credits">Credits</a>
          <a href="/system">System</a>
          <a href="/analytics">Analytics</a>
          <a href="/subagents">Subagents</a>
          <a href="/collect">Collect now</a>
        </nav>
      </header>
      <main>
        {% block content %}{% endblock %}
      </main>
    </div>
    <script>
      (() => {
        const latestCollected = document.body.dataset.latestCollected || '';
        if (!latestCollected || !window.fetch) {
          return;
        }
        const intervalMs = 45000;
        let inFlight = false;
        const poll = async () => {
          if (document.hidden || inFlight) {
            return;
          }
          inFlight = true;
          try {
            const response = await fetch('/api/summary', { cache: 'no-store' });
            if (!response.ok) {
              return;
            }
            const summary = await response.json();
            const nextCollected = summary.latest_collected || '';
            if (nextCollected && nextCollected !== document.body.dataset.latestCollected) {
              window.location.reload();
            }
          } catch (error) {
            // Keep the existing meta refresh as the primary fallback.
          } finally {
            inFlight = false;
          }
        };
        window.setInterval(poll, intervalMs);
      })();
    </script>
  </body>
</html>
